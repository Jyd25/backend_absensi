# ============================================
# Supervisor — Laravel Queue Worker
# Letakkan di: /etc/supervisor/conf.d/absensi-worker.conf
# ============================================

[program:absensi-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/absensi/artisan queue:work database --tries=3 --timeout=3600 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=deploy
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/absensi/storage/logs/worker.log
stopwaitsecs=3600
stopsignal=TERM
